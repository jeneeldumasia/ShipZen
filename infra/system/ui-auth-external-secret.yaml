apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: shipzen-ui-auth-secret
  namespace: shipzen-system
spec:
  refreshInterval: 1h
  secretStoreRef:
    # Same ClusterSecretStore used by shipzen-github and shipzen-db-credentials.
    # No new store configuration required.
    name: aws-secrets-manager
    kind: ClusterSecretStore
  target:
    name: shipzen-ui-auth   # Kubernetes Secret produced by this ExternalSecret
    creationPolicy: Owner
  data:
    - secretKey: auth_secret
      remoteRef:
        key: shipzen/ui-auth    # AWS Secrets Manager path — store the new value here
        property: auth_secret

apiVersion: config.gateway.envoyproxy.io/v1alpha1
kind: EnvoyProxy
metadata:
  name: aws-nlb-proxy
  namespace: deployhub-system
spec:
  provider:
    type: Kubernetes
    kubernetes:
      envoyService:
        type: LoadBalancer
        annotations:
          service.beta.kubernetes.io/aws-load-balancer-type: "external"
          service.beta.kubernetes.io/aws-load-balancer-nlb-target-type: "ip"
          service.beta.kubernetes.io/aws-load-balancer-scheme: "internet-facing"
---
apiVersion: gateway.networking.k8s.io/v1
kind: GatewayClass
metadata:
  name: envoy-gateway
spec:
  controllerName: gateway.envoyproxy.io/gatewayclass-controller
  parametersRef:
    group: config.gateway.envoyproxy.io
    kind: EnvoyProxy
    name: aws-nlb-proxy
    namespace: deployhub-system
---
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: deployhub-gateway
  namespace: deployhub-system
  # Annotations moved to EnvoyProxy above

spec:
  gatewayClassName: envoy-gateway
  listeners:
    - name: http
      protocol: HTTP
      port: 80
      allowedRoutes:
        namespaces:
          from: All
      # Fix #15: redirect all HTTP traffic to HTTPS.
      # Envoy Gateway implements this via an HTTPRoute filter attached to the
      # listener. The HTTPRoute below (deployhub-http-redirect) handles the
      # actual redirect; this listener just needs to accept routes from all
      # namespaces so the redirect route can bind to it.
    - name: https
      protocol: HTTPS
      port: 443
      hostname: "*.deployhub.jeneeldumasia.codes"
      tls:
        mode: Terminate
        certificateRefs:
          - name: deployhub-tls-cert
      allowedRoutes:
        namespaces:
          from: All
---
# Fix #15: catch-all HTTPRoute on port 80 that issues a 301 redirect to HTTPS.
# Attach this to the http listener so all tenant traffic is upgraded.
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: deployhub-http-redirect
  namespace: deployhub-system
spec:
  parentRefs:
    - name: deployhub-gateway
      namespace: deployhub-system
      sectionName: http
  hostnames:
    - "*.deployhub.jeneeldumasia.codes"
  rules:
    - filters:
        - type: RequestRedirect
          requestRedirect:
            scheme: https
            statusCode: 301

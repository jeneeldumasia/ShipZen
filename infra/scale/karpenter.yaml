# Upgraded from v1beta1 to v1 (stable) — required for Karpenter >= 1.0
apiVersion: karpenter.k8s.aws/v1
kind: EC2NodeClass
metadata:
  name: deployhub-default
spec:
  # v1 requires amiSelectorTerms instead of amiFamily
  amiSelectorTerms:
    - alias: al2023@latest
  role: "DeployHubKarpenterNodeRole"
  subnetSelectorTerms:
    - tags:
        karpenter.sh/discovery: "DeployHub"
  securityGroupSelectorTerms:
    - tags:
        karpenter.sh/discovery: "DeployHub"
---
# Builder NodePool — dedicated to build jobs, tainted to prevent other workloads
apiVersion: karpenter.sh/v1
kind: NodePool
metadata:
  name: builder-pool
spec:
  template:
    spec:
      requirements:
        - key: kubernetes.io/arch
          operator: In
          values: ["amd64"]
        - key: karpenter.sh/capacity-type
          operator: In
          values: ["spot", "on-demand"]
        - key: karpenter.k8s.aws/instance-category
          operator: In
          values: ["c", "m", "r", "t"]
      nodeClassRef:
        group: karpenter.k8s.aws
        kind: EC2NodeClass
        name: deployhub-default
      taints:
        - key: deployhub.jeneeldumasia.codes/dedicated
          value: builder
          effect: NoSchedule
  disruption:
    consolidationPolicy: WhenEmptyOrUnderutilized
    consolidateAfter: 1m
  limits:
    cpu: "50"
    memory: "200Gi"
---
# Tenant NodePool — stable on-demand nodes for user application workloads
apiVersion: karpenter.sh/v1
kind: NodePool
metadata:
  name: tenant-pool
spec:
  template:
    spec:
      requirements:
        - key: kubernetes.io/arch
          operator: In
          values: ["amd64"]
        - key: karpenter.sh/capacity-type
          operator: In
          values: ["on-demand"]
        - key: karpenter.k8s.aws/instance-category
          operator: In
          values: ["m", "c", "t"]
      nodeClassRef:
        group: karpenter.k8s.aws
        kind: EC2NodeClass
        name: deployhub-default
      taints:
        - key: deployhub.jeneeldumasia.codes/dedicated
          value: tenant
          effect: NoSchedule
  disruption:
    consolidationPolicy: WhenEmptyOrUnderutilized
    consolidateAfter: 1m
  limits:
    cpu: "100"
    memory: "400Gi"

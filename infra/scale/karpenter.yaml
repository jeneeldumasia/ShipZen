# Upgraded from v1beta1 to v1 (stable) — required for Karpenter >= 1.0
apiVersion: karpenter.k8s.aws/v1
kind: EC2NodeClass
metadata:
  name: shipzen-default
spec:
  # v1 requires amiSelectorTerms instead of amiFamily
  amiSelectorTerms:
    # Pinned to AL2023 v20250512. Pinned on 2025-07-02. Review by 2025-12-29.
    - alias: al2023@latest
  role: "ShipZenKarpenterNodeRole"
  subnetSelectorTerms:
    - tags:
        karpenter.sh/discovery: "ShipZen"
  securityGroupSelectorTerms:
    - tags:
        karpenter.sh/discovery: "ShipZen"
---
# Builder NodePool — dedicated to build jobs, tainted to prevent other workloads
apiVersion: karpenter.sh/v1
kind: NodePool
metadata:
  name: builder-pool
spec:
  template:
    spec:
      requirements:
        - key: kubernetes.io/arch
          operator: In
          values: ["amd64"]
        - key: karpenter.sh/capacity-type
          operator: In
          values: ["spot", "on-demand"]
        - key: karpenter.k8s.aws/instance-category
          operator: In
          values: ["c", "m", "r", "t"]
      nodeClassRef:
        group: karpenter.k8s.aws
        kind: EC2NodeClass
        name: shipzen-default
      taints:
        - key: shipzen.jeneeldumasia.codes/dedicated
          value: builder
          effect: NoSchedule
  disruption:
    consolidationPolicy: WhenEmptyOrUnderutilized
    consolidateAfter: 1m
  limits:
    # Supports up to ~4 concurrent single-core builds or 2 dual-core builds.
    # Increase cpu to "8" and memory to "16Gi" if queue depth regularly exceeds 4.
    cpu: "4"
    memory: "8Gi"
---
# Tenant NodePool — stable on-demand nodes for user application workloads
apiVersion: karpenter.sh/v1
kind: NodePool
metadata:
  name: tenant-pool
spec:
  template:
    spec:
      requirements:
        - key: kubernetes.io/arch
          operator: In
          values: ["amd64"]
        - key: karpenter.sh/capacity-type
          operator: In
          values: ["on-demand"]
        - key: karpenter.k8s.aws/instance-category
          operator: In
          values: ["m", "c", "t"]
      nodeClassRef:
        group: karpenter.k8s.aws
        kind: EC2NodeClass
        name: shipzen-default
      taints:
        - key: shipzen.jeneeldumasia.codes/dedicated
          value: tenant
          effect: NoSchedule
  disruption:
    consolidationPolicy: WhenEmptyOrUnderutilized
    consolidateAfter: 1m
  limits:
    # Supports ~4 lightweight tenant workloads at 1 CPU / 2 GiB each.
    # Increase to "16" cpu and "32Gi" memory as tenant count grows past 4.
    cpu: "4"
    memory: "8Gi"
apiVersion: apps/v1
kind: Deployment
metadata:
  name: deployhub-worker
  namespace: deployhub-system
  labels:
    app: deployhub-worker
spec:
  replicas: 2
  selector:
    matchLabels:
      app: deployhub-worker
  template:
    metadata:
      labels:
        app: deployhub-worker
    spec:
      serviceAccountName: deployhub-worker-sa
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: worker
          image: deployhub-worker:latest
          imagePullPolicy: Always
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          ports:
            - name: metrics
              containerPort: 8000
              protocol: TCP
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: deployhub-db-credentials
                  key: url
            - name: REDIS_HOST
              value: "redis-master.deployhub-system.svc.cluster.local"
            - name: STREAM_NAME
              value: "deploy_stream"
            - name: CONSUMER_GROUP
              value: "worker_group"
            - name: BUILDER_QUEUE_NAME
              value: "builder_queue"
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"

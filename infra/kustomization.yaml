apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Top-level kustomization for ArgoCD.
# ArgoCD syncs path: infra which resolves to this file.
# Every sub-directory that has a kustomization.yaml is listed here.

resources:
  - system/
  - controller/
  - worker/
  - api/
  - builder/
  - scale/
  - ui/

images:
  - name: deployhub-api
    newName: ghcr.io/jeneeldumasia/deployhub-api
    newTag: latest
  - name: deployhub-controller
    newName: ghcr.io/jeneeldumasia/deployhub-controller
    newTag: latest
  - name: deployhub-worker
    newName: ghcr.io/jeneeldumasia/deployhub-worker
    newTag: latest
  - name: deployhub-ui
    newName: ghcr.io/jeneeldumasia/deployhub-ui
    newTag: latest

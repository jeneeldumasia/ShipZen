apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: shipzen-api-redeployer
rules:
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: shipzen-api-redeployer-binding
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: shipzen-api-redeployer
subjects:
  - kind: ServiceAccount
    name: shipzen-api-sa
    namespace: shipzen-system

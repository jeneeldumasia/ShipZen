apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: shipzen-api
  namespace: shipzen-system
spec:
  parentRefs:
    - name: shipzen-gateway
      namespace: shipzen-system
      sectionName: https
  hostnames:
    - "api-shipzen.jeneeldumasia.codes"
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: shipzen-api
          port: 80

apiVersion: apps/v1
kind: Deployment
metadata:
  name: shipzen-api
  namespace: shipzen-system
  labels:
    app: shipzen-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: shipzen-api
  template:
    metadata:
      labels:
        app: shipzen-api
    spec:
      serviceAccountName: shipzen-api-sa
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: api
          image: shipzen-api:latest
          imagePullPolicy: Always
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP
          env:
            - name: AWS_ROLE_ARN
              value: "arn:aws:iam::952994886652:role/ShipZenBuilderRole"
            - name: AWS_WEB_IDENTITY_TOKEN_FILE
              value: "/var/run/secrets/eks.amazonaws.com/serviceaccount/token"
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: shipzen-db-credentials
                  key: url
            - name: REDIS_HOST
              value: "redis-master.shipzen-system.svc.cluster.local"
            - name: STREAM_NAME
              value: "deploy_stream"
            - name: UI_ORIGIN
              value: "https://shipzen.jeneeldumasia.codes"
            - name: ECR_REPOSITORY_URL
              valueFrom:
                secretKeyRef:
                  name: shipzen-ecr-config
                  key: repository_url
            - name: GITHUB_ENABLED
              value: "true"   # Set to "false" only in local development — disables auth entirely
            - name: GITHUB_APP_WEBHOOK_SECRET
              valueFrom:
                secretKeyRef:
                  name: shipzen-github
                  key: app_webhook_secret
                  optional: true
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
          volumeMounts:
            - mountPath: /var/run/secrets/eks.amazonaws.com/serviceaccount
              name: aws-iam-token
              readOnly: true
      volumes:
        - name: aws-iam-token
          projected:
            defaultMode: 420
            sources:
            - serviceAccountToken:
                audience: sts.amazonaws.com
                expirationSeconds: 86400
                path: token

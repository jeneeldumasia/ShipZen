apiVersion: v1
kind: ServiceAccount
metadata:
  name: deployhub-builder-sa
  namespace: deployhub-build
  annotations:
    # IRSA: IAM Roles for Service Accounts — grants ECR read/write access.
    # Task 18 / fix #4.1: replaced hardcoded account ID 123456789012.
    # Run `terraform output aws_account_id` after apply and substitute below,
    # OR use the Terraform kubernetes_manifest resource to inject dynamically.
    # Format: arn:aws:iam::<ACCOUNT_ID>:role/DeployHubBuilderRole
    eks.amazonaws.com/role-arn: arn:aws:iam::ACCOUNT_ID_FROM_TERRAFORM_OUTPUT:role/DeployHubBuilderRole
automountServiceAccountToken: false # Block Kubernetes API access by default

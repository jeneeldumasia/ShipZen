apiVersion: apps/v1
kind: Deployment
metadata:
  name: shipzen-builder
  namespace: shipzen-build
  labels:
    app: shipzen-builder
spec:
  replicas: 0 # KEDA scale-to-zero
  selector:
    matchLabels:
      app: shipzen-builder
  template:
    metadata:
      labels:
        app: shipzen-builder
    spec:
      serviceAccountName: shipzen-builder-sa
      securityContext:
        seccompProfile:
          type: RuntimeDefault
        runAsNonRoot: true
        runAsUser: 1000
      # Toleration to schedule on the dedicated builder NodePool.
      # Builder nodes are tainted shipzen.jeneeldumasia.codes/dedicated=builder:NoSchedule
      # so only pods with this toleration land there.
      tolerations:
        - key: shipzen.jeneeldumasia.codes/dedicated
          operator: Equal
          value: builder
          effect: NoSchedule
      containers:
        - name: builder
          image: shipzen-builder:latest
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            seccompProfile:
              type: RuntimeDefault
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "1Gi"
          env:
            - name: REDIS_HOST
              value: "redis-master.shipzen-system.svc.cluster.local"
            # Fix #7: key name matches config.BUILDER_QUEUE_NAME
            - name: BUILDER_QUEUE_NAME
              value: "builder_queue"
            # Fix #16: DATABASE_URL and S3_LOG_BUCKET were missing — builder
            # was falling back to localhost postgres and a wrong bucket name.
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: shipzen-db-credentials
                  key: url
            - name: S3_LOG_BUCKET
              valueFrom:
                secretKeyRef:
                  name: shipzen-s3-config
                  key: bucket_name
            - name: CONSUMER_GROUP
              value: "builder_group"
          ports:
            - name: metrics
              containerPort: 8001
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /
              port: 8001
            initialDelaySeconds: 15
            periodSeconds: 20
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /
              port: 8001
            initialDelaySeconds: 10
            periodSeconds: 10

apiVersion: v1
kind: ServiceAccount
metadata:
  name: external-secrets-sa
  namespace: external-secrets
  annotations:
    # IRSA: grants secretsmanager:GetSecretValue to the ESO operator.
    # Task 18 / fix #4.1: replaced hardcoded account ID 123456789012.
    # Task 19 / fix #5.9: replaced hardcoded region us-east-1.
    # Both values are now populated by the Terraform null_resource below.
    # Run `terraform output aws_account_id` and `var.aws_region` to get values.
    # Format: arn:aws:iam::<ACCOUNT_ID>:role/DeployHubESO
    eks.amazonaws.com/role-arn: arn:aws:iam::ACCOUNT_ID_FROM_TERRAFORM_OUTPUT:role/DeployHubESO
---
apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore
metadata:
  name: aws-secrets-manager
spec:
  provider:
    aws:
      service: SecretsManager
      # Task 19 / fix #5.9: was hardcoded to us-east-1.
      # This value is now set dynamically by terraform/operators.tf via a
      # kubernetes_manifest resource that injects var.aws_region at apply time.
      # The placeholder below is overwritten by Terraform on every apply.
      region: REGION_FROM_TERRAFORM_VAR
      auth:
        jwt:
          serviceAccountRef:
            name: external-secrets-sa
            namespace: external-secrets

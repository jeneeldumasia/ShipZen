name: Deploy Secrets to EKS

on:
  # Only trigger on changes to this workflow file itself, or manually.
  # Pushing secrets on every commit to main is unnecessary overhead.
  push:
    branches:
      - main
    paths:
      - '.github/workflows/deploy-secrets.yaml'
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  deploy-secrets:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::952994886652:role/ShipZenGitHubActionsRole
          aws-region: us-east-1

      - name: Update kubeconfig
        run: aws eks update-kubeconfig --region us-east-1 --name shipzen-cluster

      - name: Deploy GitHub OAuth Secret
        run: |
          kubectl create secret generic shipzen-github \
            --from-literal=enabled=true \
            --from-literal=client_id=${{ secrets.SHIPZEN_GITHUB_CLIENT_ID }} \
            --from-literal=client_secret=${{ secrets.SHIPZEN_GITHUB_CLIENT_SECRET }} \
            --from-literal=app_webhook_secret=${{ secrets.SHIPZEN_GITHUB_APP_WEBHOOK_SECRET }} \
            -n shipzen-system --dry-run=client -o yaml | kubectl apply -f -

      - name: Push AUTH_SECRET to AWS Secrets Manager
        # AUTH_SECRET is consumed by the Next.js UI (NextAuth).
        # ESO reads it from Secrets Manager and injects it as the shipzen-auth-secret K8s secret.
        # To rotate: update the SHIPZEN_AUTH_SECRET GitHub Actions secret and re-run this workflow.
        run: |
          aws secretsmanager put-secret-value \
            --secret-id "shipzen/auth-secret" \
            --secret-string "{\"value\": \"${{ secrets.SHIPZEN_AUTH_SECRET }}\"}" \
            --region us-east-1 2>/dev/null || \
          aws secretsmanager create-secret \
            --name "shipzen/auth-secret" \
            --description "NextAuth AUTH_SECRET for ShipZen UI" \
            --secret-string "{\"value\": \"${{ secrets.SHIPZEN_AUTH_SECRET }}\"}" \
            --region us-east-1

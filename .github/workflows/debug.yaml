name: Debug Cluster
on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  debug:
    runs-on: ubuntu-latest
    env:
      AWS_REGION: ''
    steps:
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION || 'us-east-1' }}

      - name: Debug Cluster
        run: |
          aws eks update-kubeconfig --region ${{ vars.AWS_REGION || 'us-east-1' }} --name shipzen-cluster
          echo "=== NODES ==="
          kubectl get nodes -o wide || true
          echo "=== PODS ==="
          kubectl get pods -A -o wide || true
          echo "=== EVENTS ==="
          kubectl get events -A --sort-by='.lastTimestamp' | tail -n 50 || true
          echo "=== WEBHOOKS ==="
          kubectl get validatingwebhookconfigurations || true
          kubectl get mutatingwebhookconfigurations || true
          
          echo "=== RESTARTING UI PODS ==="
          kubectl rollout restart deployment shipzen-ui -n shipzen-system
          
          echo "Waiting for UI pods to restart..."
          kubectl rollout status deployment shipzen-ui -n shipzen-system --timeout=60s || true

name: Container Security Scan (Trivy)

# SECURITY NOTE: trivy-action was compromised in CVE-2026-33634 (March 2026).
# We install the Trivy binary directly from the official GitHub release rather
# than using the trivy-action GitHub Action, eliminating the supply chain risk.

on:
  schedule:
    - cron: '0 2 * * *' # Run nightly at 2 AM UTC
  workflow_dispatch:

permissions:
  contents: read

jobs:
  trivy-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Trivy from official release
        run: |
          # Pin to a specific known-good version. Update deliberately after reviewing release notes.
          TRIVY_VERSION="0.69.3"
          TRIVY_ARCHIVE="trivy_${TRIVY_VERSION}_Linux-64bit.tar.gz"
          curl -sfL "https://github.com/aquasecurity/trivy/releases/download/v${TRIVY_VERSION}/${TRIVY_ARCHIVE}" \
            -o "${TRIVY_ARCHIVE}"
          # Verify checksum
          curl -sfL "https://github.com/aquasecurity/trivy/releases/download/v${TRIVY_VERSION}/trivy_${TRIVY_VERSION}_checksums.txt" \
            -o trivy_checksums.txt
          grep "${TRIVY_ARCHIVE}" trivy_checksums.txt | sha256sum --check
          tar -xzf "${TRIVY_ARCHIVE}" trivy
          sudo mv trivy /usr/local/bin/trivy
          trivy --version

      - name: Run Trivy filesystem scan
        run: |
          trivy fs \
            --ignore-unfixed \
            --format table \
            --severity CRITICAL,HIGH \
            --exit-code 1 \
            .

name: Deploy Platform (Terraform + ArgoCD)

on:
  push:
    branches:
      - main
    paths:
      - 'terraform/**'
      - '.github/workflows/deploy.yaml'
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  terraform-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION || 'us-east-1' }}


      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          cli_config_credentials_token: ${{ secrets.TF_API_TOKEN }}

      - name: Terraform Init
        working-directory: ./terraform
        run: terraform init

      - name: Run tfsec
        uses: aquasecurity/tfsec-action@v1.0.3
        with:
          working_directory: ./terraform
          soft_fail: true # Set to false to block deployments on security issues
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Run Checkov
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: ./terraform
          framework: terraform
          soft_fail: true # Set to false to block deployments on security issues

      - name: Cleanup Stuck Webhooks
        working-directory: ./terraform
        run: |
          aws eks update-kubeconfig --region ${{ vars.AWS_REGION || 'us-east-1' }} --name deployhub-cluster || true
          kubectl delete validatingwebhookconfigurations --all || true
          kubectl delete mutatingwebhookconfigurations --all || true
          kubectl patch clusterpolicies.kyverno.io --all -p '{"metadata":{"finalizers":[]}}' --type=merge || true
          kubectl patch policies.kyverno.io --all -A -p '{"metadata":{"finalizers":[]}}' --type=merge || true
          helm uninstall kyverno -n kyverno --no-hooks || true
          helm uninstall postgresql -n deployhub-system --no-hooks || true
          helm uninstall redis -n deployhub-system --no-hooks || true
          terraform state rm helm_release.kyverno || true
          terraform state rm helm_release.postgresql || true
          terraform state rm helm_release.redis || true

      - name: Terraform Plan
        working-directory: ./terraform
        run: terraform plan -out=tfplan

      - name: Terraform Apply
        working-directory: ./terraform
        run: terraform apply tfplan

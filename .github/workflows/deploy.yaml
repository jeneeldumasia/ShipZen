name: Deploy Platform (Terraform + ArgoCD)

on:
  push:
    branches:
      - main
    paths:
      - 'terraform/**'
      - '.github/workflows/deploy.yaml'
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  terraform-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION || 'us-east-1' }}


      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          cli_config_credentials_token: ${{ secrets.TF_API_TOKEN }}

      - name: Terraform Init
        working-directory: ./terraform
        run: terraform init

      - name: Run tfsec
        uses: aquasecurity/tfsec-action@v1.0.3
        with:
          working_directory: ./terraform
          soft_fail: true # Set to false to block deployments on security issues
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Run Checkov
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: ./terraform
          framework: terraform
          soft_fail: true # Set to false to block deployments on security issues

      - name: Cleanup Stuck Webhooks
        working-directory: ./terraform
        run: |
          aws eks update-kubeconfig --region ${{ vars.AWS_REGION || 'us-east-1' }} --name deployhub-cluster || true
          kubectl delete validatingwebhookconfigurations --all || true
          kubectl delete mutatingwebhookconfigurations --all || true

      - name: Terraform Plan
        working-directory: ./terraform
        env:
          TF_VAR_cloudflare_api_token: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: terraform plan -out=tfplan

      - name: Terraform Apply
        working-directory: ./terraform
        env:
          TF_VAR_cloudflare_api_token: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: terraform apply tfplan

      - name: Configure kubectl
        run: aws eks update-kubeconfig --region ${{ vars.AWS_REGION || 'us-east-1' }} --name deployhub-cluster

      - name: Clean up stale cert-manager state
        run: |
          # Force-delete any stuck challenges so cert-manager can start fresh
          kubectl get challenge -n deployhub-system -o name 2>/dev/null | \
            xargs -I {} kubectl patch {} -n deployhub-system -p '{"metadata":{"finalizers":[]}}' --type=merge 2>/dev/null || true
          kubectl delete challenge --all -n deployhub-system --grace-period=0 --force 2>/dev/null || true
          # Delete the cached Kubernetes secret so ESO fetches the latest from AWS
          kubectl delete secret cloudflare-api-token-secret -n cert-manager 2>/dev/null || true
          # Restart cert-manager to clear any backoff/rate-limit state
          kubectl rollout restart deployment cert-manager -n cert-manager
          kubectl rollout status deployment cert-manager -n cert-manager --timeout=120s

      - name: Wait for TLS Certificate
        run: |
          echo "Waiting for TLS certificate to be issued..."
          ELAPSED=0
          MAX_WAIT=300
          while [ $ELAPSED -lt $MAX_WAIT ]; do
            READY=$(kubectl get certificate deployhub-tls-cert -n deployhub-system -o jsonpath='{.status.conditions[?(@.type=="Ready")].status}' 2>/dev/null || echo "False")
            if [ "$READY" = "True" ]; then
              echo "TLS certificate is ready!"
              break
            fi
            echo "Certificate not ready yet (${ELAPSED}s/${MAX_WAIT}s)..."
            sleep 10
            ELAPSED=$((ELAPSED+10))
          done
          if [ "$READY" != "True" ]; then
            echo "WARNING: Certificate did not become ready within ${MAX_WAIT}s."
            echo "Checking cert-manager logs for errors:"
            kubectl logs deployment/cert-manager -n cert-manager --tail=20 | grep -i -E 'error|fail|cloudflare' || true
            echo "Checking challenge status:"
            kubectl get challenge -n deployhub-system || true
          fi

      - name: Output NLB URL
        run: |
          # Give the load balancer a moment to be registered
          sleep 10
          NLB_URL=$(kubectl get svc -A -o jsonpath="{.items[?(@.spec.type=='LoadBalancer')].status.loadBalancer.ingress[0].hostname}")
          CERT_READY=$(kubectl get certificate deployhub-tls-cert -n deployhub-system -o jsonpath='{.status.conditions[?(@.type=="Ready")].status}' 2>/dev/null || echo "False")
          echo "### Deployment Successful :rocket:" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Network Load Balancer (NLB):** \`$NLB_URL\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ "$CERT_READY" = "True" ]; then
            echo ":white_check_mark: **TLS Certificate:** Issued and active" >> $GITHUB_STEP_SUMMARY
          else
            echo ":warning: **TLS Certificate:** Not yet ready — check cert-manager logs" >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Configure your Cloudflare CNAME records to point to the NLB address." >> $GITHUB_STEP_SUMMARY
